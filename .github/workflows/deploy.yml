name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Show versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: List packages
        run: ls -la packages/ apps/

      - name: Build PC
        run: cd apps/pc && pnpm exec vite build
        env:
          VITE_BASE_URL: /gongchengcang/
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify build output
        run: |
          ls -la apps/pc/dist/
          head -20 apps/pc/dist/index.html

      - name: Create .nojekyll and 404.html
        run: |
          touch apps/pc/dist/.nojekyll
          cp apps/pc/dist/index.html apps/pc/dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/pc/dist
          publish_branch: gh-pages
          force_orphan: true
